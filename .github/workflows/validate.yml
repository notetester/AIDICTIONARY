name: Validate dictionary

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check JavaScript syntax
        run: |
          node --check app.js
          for file in data/*.js; do node --check "$file"; done

      - name: Validate terminology data and expert details
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');
          const vm = require('vm');

          const sandbox = { window: {} };
          const orderedFiles = [
            'terms-ml.js',
            'terms-llm.js',
            'terms-it.js',
            'terms-expert-ai.js',
            'learning-paths.js',
            'term-details.js',
            'term-details-expert.js'
          ];

          for (const file of orderedFiles) {
            const fullPath = path.join('data', file);
            if (!fs.existsSync(fullPath)) throw new Error(`Missing data file: ${file}`);
            vm.runInNewContext(fs.readFileSync(fullPath, 'utf8'), sandbox, { filename: file });
          }

          const terms = sandbox.window.AIDICTIONARY_TERMS;
          const details = sandbox.window.AIDICTIONARY_DETAILS || {};
          const learningPaths = sandbox.window.AIDICTIONARY_PATHS || [];
          if (!Array.isArray(terms)) throw new Error('Terminology data was not initialized.');
          if (terms.length < 145) throw new Error(`Expected at least 145 terms, received ${terms.length}.`);

          const required = ['id', 'term', 'english', 'category', 'level', 'short', 'description', 'example'];
          const ids = new Set();
          const unresolvedRelations = [];

          for (const term of terms) {
            for (const field of required) {
              if (!term[field]) throw new Error(`Missing ${field} in ${term.id || JSON.stringify(term)}`);
            }
            if (ids.has(term.id)) throw new Error(`Duplicate id: ${term.id}`);
            ids.add(term.id);
          }

          for (const term of terms) {
            for (const relatedId of term.related || []) {
              if (!ids.has(relatedId)) unresolvedRelations.push(`${term.id} -> ${relatedId}`);
            }
          }

          for (const [id, detail] of Object.entries(details)) {
            if (!ids.has(id)) throw new Error(`Expert detail points to missing term: ${id}`);
            for (const field of ['intuition', 'precise']) {
              if (!detail[field]) throw new Error(`Missing expert detail ${field} in ${id}`);
            }
            for (const linkedId of [...(detail.prerequisites || []), ...(detail.next || [])]) {
              if (!ids.has(linkedId)) unresolvedRelations.push(`${id} -> ${linkedId}`);
            }
          }

          if (Object.keys(details).length < 38) {
            throw new Error(`Expected at least 38 expert explanations, received ${Object.keys(details).length}.`);
          }

          if (!Array.isArray(learningPaths) || learningPaths.length < 6) {
            throw new Error(`Expected at least 6 learning paths, received ${learningPaths.length || 0}.`);
          }
          const pathIds = new Set();
          for (const learningPath of learningPaths) {
            if (!learningPath.id || !learningPath.title || !Array.isArray(learningPath.terms) || !learningPath.terms.length) {
              throw new Error(`Invalid learning path: ${JSON.stringify(learningPath)}`);
            }
            if (pathIds.has(learningPath.id)) throw new Error(`Duplicate learning path id: ${learningPath.id}`);
            pathIds.add(learningPath.id);
            for (const termId of learningPath.terms) {
              if (!ids.has(termId)) unresolvedRelations.push(`path:${learningPath.id} -> ${termId}`);
            }
          }

          const categories = new Set(terms.map((term) => term.category));
          if (categories.size < 8) throw new Error(`Expected at least 8 categories, received ${categories.size}.`);

          console.log(`Validated ${terms.length} terms across ${categories.size} categories.`);
          console.log(`Validated ${Object.keys(details).length} expert explanations.`);
          console.log(`Validated ${learningPaths.length} curated learning paths.`);
          if (unresolvedRelations.length) {
            console.warn(`Unresolved optional relations (${unresolvedRelations.length}):`);
            console.warn(unresolvedRelations.slice(0, 30).join('\n'));
          }
          NODE
